  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initPageComponents({ title: '我的' });
      
      function createRipple(event, element) {
        const circle = document.createElement('span');
        const diameter = Math.max(element.clientWidth, element.clientHeight);
        const radius = diameter / 2;
        
        circle.style.width = circle.style.height = `${diameter}px`;
        circle.style.left = `${event.clientX - element.getBoundingClientRect().left - radius}px`;
        circle.style.top = `${event.clientY - element.getBoundingClientRect().top - radius}px`;
        circle.classList.add('ripple');
        
        const ripple = element.getElementsByClassName('ripple')[0];
        if (ripple) {
          ripple.remove();
        }
        
        element.appendChild(circle);
      }
      
      const featureItems = document.querySelectorAll('.feature-item');
      featureItems.forEach(item => {
        item.addEventListener('click', function(e) {
          createRipple(e, this);
        });
      });
      
      const statusItems = document.querySelectorAll('.status-item');
      statusItems.forEach(item => {
        item.addEventListener('click', function(e) {
          createRipple(e, this);
        });
      });
      
      const profileHeader = document.querySelector('.profile-header');
      if (profileHeader) {
        profileHeader.addEventListener('click', function(e) {
          createRipple(e, this);
        });
      }
      
      const logoutBtn = document.querySelector('.logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function(e) {
          createRipple(e, this);
        });
      }
    });
  </script>
